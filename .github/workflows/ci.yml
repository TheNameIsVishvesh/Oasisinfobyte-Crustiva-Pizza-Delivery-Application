name: Pizza Delivery App CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package.json'

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Frontend Application
        run: |
          cd client
          npm run build

  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package.json'

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Backend Syntax & Load Check
        run: |
          cd server
          node --check src/server.js
